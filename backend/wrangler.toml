name            = "dealforward-api"
main            = "main.py"
compatibility_date  = "2024-09-23"
compatibility_flags = ["python_workers"]

# Non-secret configuration.
# Secrets (SUPABASE_SERVICE_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY) are set via:
#   wrangler secret put SECRET_NAME
#   or the Cloudflare dashboard → Workers → Settings → Variables
[vars]
ALLOWED_ORIGIN = "https://dealforward.pages.dev"

# Optional: Cloudflare R2 bucket for audio uploads
# [[r2_buckets]]
# binding     = "AUDIO_BUCKET"
# bucket_name = "dealforward-audio"

[env.production]
vars = { ALLOWED_ORIGIN = "https://dealforward.pages.dev" }

[env.preview]
vars = { ALLOWED_ORIGIN = "http://localhost:5173" }
